[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "earshot"
version = "0.1.0"
description = "On-device conversation recorder and transcriber for Raspberry Pi"
readme = "README.md"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["."]
include = ["earshot*"]
